<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de esconder elementos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Formas de esconder elementos</h1>
    <h2>Display none</h2>
        <div class="exemplos">
        <div class="caixa normal">Caixa</div>
        <div class="caixa display-none">Caixa Oculta</div>
        <div class="caixa normal">Caixa</div>
    </div>
    <h2>Visibility hidden</h2>
        <div class="exemplos">
        <div class="caixa normal">Caixa</div>
        <div class="caixa visibility-hidden">Caixa Oculta</div>
        <div class="caixa normal">Caixa</div>
    </div>
    <h2>Opacity 0</h2>
        <div class="exemplos">
        <div class="caixa normal">Caixa</div>
        <div class="caixa opacity-0">Caixa Oculta</div>
        <div class="caixa normal">Caixa</div>
    </div>
</body>
</html>
