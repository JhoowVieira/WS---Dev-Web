<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas Semânticas</title>
</head>
<body>
    <h1>Tabelas Semânticas</h1>

    <table border="3">
        <caption>
            Titulo Tabelas

        </caption>
        <thead>
            <tr>
                <th scope="col">Gustavo</th>
                <th scope="col">Batman</th>
                <th scope="col">Jhon</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th scope="row" rowspan="2">Gustavo1</th>
                <td>Batman2</td>
                <td>Jhon3</td>
            </tr>
            <tr>
                <td>Batman2</td>
                <td>Jhon3</td>
            </tr>
        </tbody>
        <tfoot>
            <th scope="row" colspan="3">Rodapé </th>
        </tfoot>
    </table>

    <h1>Ele ta apaixonadinho</h1>
</body>
</html>
